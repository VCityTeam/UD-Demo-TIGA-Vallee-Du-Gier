<!-- @format -->

<!DOCTYPE html>
<html>
  <head>
    <title>Parcours questions</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../src/css/style.css" rel="stylesheet" />
    <!-- Inter font -->
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  </head>
  <body>
    <script src="../dist/release/vdg_app.js"></script>
    <!-- <script src="../dist/debug/vdg_app.js"></script> -->
    <script type="text/javascript">
      vdg_app.FileUtil.loadMultipleJSON([
        '../assets/config/formConfig.json',
        '../assets/config/mediaConfig.json',
        '../assets/config/captionConfig.json',
        '../assets/config/config.json',
      ]).then((configs) => {
        vdg_app.proj4.default.defs(
          configs['config'].projection,
          '+proj=lcc +lat_1=45.25 +lat_2=46.75' +
            ' +lat_0=46 +lon_0=3 +x_0=1700000 +y_0=5200000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs'
        );

        const extent = new vdg_app.itowns.Extent(
          configs['config'].projection,
          parseInt(configs['config']['extents'].min_x),
          parseInt(configs['config']['extents'].max_x),
          parseInt(configs['config']['extents'].min_y),
          parseInt(configs['config']['extents'].max_y)
        );

        const frame3DPlanar = new vdg_app.Frame3DPlanar(
          extent,
          configs['config'].planar
        );

        const baseMap = new vdg_app.Widget.BaseMap(
          frame3DPlanar.getItownsView(),
          configs['config']['baseMapLayers'],
          extent
        );

        vdg_app.addLabelLayers(configs['config'], frame3DPlanar.getItownsView());

        const visit = new vdg_app.GuidedVisit(
          frame3DPlanar,
          configs['mediaConfig'].medias
        );

        const visitConfig = configs['formConfig'].visits.find(
          (v) => v.id == 'P_QUESTIONS'
        );
        visit.start(visitConfig, configs['captionConfig']);
      });
    </script>
  </body>
</html>
